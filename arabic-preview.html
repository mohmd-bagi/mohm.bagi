<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arabic Preview</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#44546b;--line:#dbe5f1;--blue:#1261d8;--green:#12a878;--dark:#121826;--shadow:0 16px 40px rgba(15,23,42,.10);--r:22px}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at top right,#ddecff 0,#f4f7fb 34%,#eef5ff 100%);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;line-height:1.8;min-height:100vh}.dark{--bg:#111827;--card:#1f2937;--text:#eef6ff;--muted:#cbd5e1;--line:#334155;--dark:#ffd15b}a{color:inherit}.loading{min-height:100vh;display:grid;place-items:center;font-weight:900;color:var(--blue)}
body.loaded{display:flex}.sidebar{width:285px;background:rgba(255,255,255,.92);border-right:1px solid var(--line);min-height:100vh;padding:18px;display:flex;flex-direction:column;position:fixed;left:0;right:auto;top:0;bottom:0;z-index:10;box-shadow:8px 0 30px rgba(15,23,42,.06);backdrop-filter:blur(12px);overflow:auto}.dark .sidebar{background:rgba(31,41,55,.94)}.sidebar .sidebar-block{margin:0 0 13px;border-radius:18px;padding:14px 15px;background:var(--card);border:1px solid var(--line);box-shadow:0 8px 20px rgba(15,23,42,.05)}.sidebar .sidebar-block.clock{font-size:1.45em;font-weight:900;letter-spacing:1px;text-align:center;color:var(--blue);background:linear-gradient(135deg,#e9f4ff,#fff)}.sidebar .sidebar-block.prayer{background:linear-gradient(135deg,#eef6ff,#fff)}.sidebar .sidebar-block.weather{background:linear-gradient(135deg,#fff6db,#fff);color:#9a6500}.sidebar .sidebar-block.links{background:transparent;box-shadow:none;border:0;padding:0}.sidebar-block.links a{display:flex;align-items:center;gap:9px;background:var(--card);margin-bottom:8px;border-radius:14px;padding:10px 12px;text-decoration:none;color:#1d3658;font-weight:800;font-size:.98em;border:1px solid var(--line);transition:transform .15s,background .15s,color .15s,box-shadow .15s}.sidebar-block.links a:hover{background:#edf6ff;color:var(--blue);transform:translateY(-2px);box-shadow:0 8px 18px rgba(18,97,216,.12)}.dark .sidebar-block.links a{background:#111827;color:#e5edf8}.quick-nav{background:#f7fbff;padding:14px;border-radius:18px;font-size:1em;border:1px solid var(--line);box-shadow:0 8px 20px rgba(15,23,42,.04)}.quick-nav-title{font-weight:900;margin-bottom:8px;color:var(--blue)}.quick-nav a{display:block;color:#1261d8;margin:3px 0;text-decoration:none;padding:7px 10px;border-radius:10px;font-weight:800}.quick-nav a:hover{background:#e8f2ff}.main-content{flex:1 1 0;margin-left:285px;margin-right:0;padding:26px clamp(14px,2vw,32px) 40px;min-width:0;background:transparent}.switch-wrap{position:fixed;top:18px;right:18px;left:auto;display:flex;gap:10px;z-index:99;flex-direction:row-reverse}.switch-btn{border:0;background:var(--dark);color:#fff;font-size:1.05em;border-radius:14px;padding:10px 16px;cursor:pointer;font-weight:900;box-shadow:0 10px 22px rgba(15,23,42,.14)}.switch-btn:hover{background:var(--blue);color:#ffd15b;transform:translateY(-2px)}.dark .switch-btn{background:#ffd15b;color:#173665}.live-bar{max-width:980px;margin:0 auto 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:transparent;padding:0;box-shadow:none}.live-bar a{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:16px;font-weight:900;color:#fff;text-decoration:none;font-size:1.03em;transition:transform .15s,filter .15s;box-shadow:0 10px 24px rgba(15,23,42,.10)}.live-bar .makkah{background:#0ca878}.live-bar .quran{background:#1261d8}.live-bar .aljazeera{background:#0f9f5f}.live-bar a:hover{filter:brightness(1.08);transform:translateY(-2px)}.cover-banner{width:100%;max-width:980px;height:210px;margin:0 auto;border-radius:28px 28px 0 0;background:url('adi-goldstein-EUsVwEOsblE-unsplash.jpg') center/cover no-repeat;position:relative;margin-bottom:-68px;box-shadow:var(--shadow);border-bottom:4px solid var(--blue);z-index:2}.profile-pic{width:138px;height:138px;border-radius:50%;border:7px solid var(--card);object-fit:cover;margin:0 auto;position:relative;z-index:3;display:block;top:-2px;box-shadow:0 16px 35px rgba(15,23,42,.22);background:#fff}.headline{text-align:center;font-size:clamp(1.9rem,4vw,3.3rem);line-height:1.1;font-weight:950;color:var(--blue);margin:10px auto 10px;max-width:980px}.headline .circle-anim{display:none}.sub-headline{text-align:center;font-size:1.12em;color:#40516b;margin:0 auto 20px;max-width:900px}.dark .sub-headline{color:#cbd5e1}.btns-center{text-align:center;margin-bottom:26px}.btns-center a{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;margin:6px;border-radius:14px;color:#fff;text-decoration:none;font-weight:900;font-size:1em;box-shadow:0 9px 18px rgba(15,23,42,.12);transition:filter .13s,transform .12s}.linkedin{background:#0077b5}.whatsapp{background:#25D366}.download-en{background:#2a9c4e}.download-ar{background:#b54c0a}.btns-center a:hover{filter:brightness(1.08);transform:translateY(-2px)}.section{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px 26px;box-shadow:var(--shadow);margin:24px auto;max-width:980px}.dark .section{background:#1f2937}h2{color:var(--blue);font-size:1.55em;margin-top:0;margin-bottom:12px}.dark h2{color:#ffd15b}.section p,.section li{font-size:1.02em}.section ul{padding-right:22px}.section li{margin-bottom:7px}.exp-date,.edu-date{display:inline-block;color:var(--blue);background:#eaf1ff;font-weight:900;border-radius:999px;padding:2px 11px;font-size:.92em;margin-right:10px}.edu-date{background:#fff3c7;color:#9a6500}.skills-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.skill-card{background:linear-gradient(135deg,#f8fbff,#e7f4ff);border-radius:16px;padding:16px 12px;text-align:center;box-shadow:0 8px 18px rgba(15,23,42,.06);font-weight:900;font-size:1em;color:#14506b;border:1px solid #dbeafe;min-height:92px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:7px;transition:transform .15s,box-shadow .15s}.skill-card:hover{transform:translateY(-3px);box-shadow:0 14px 26px rgba(18,97,216,.14)}.skill-card i{font-size:1.35em}.dark .skill-card{background:linear-gradient(135deg,#111827,#17324a);color:#e7fdff;border-color:#365886}.progress-title,.lang-progress-title{font-weight:900;margin-bottom:4px}.progress-bar-bg,.lang-progress-bar-bg{background:#e5edf7;border-radius:999px;overflow:hidden;height:16px;margin-bottom:12px;box-shadow:inset 0 1px 4px rgba(15,23,42,.08)}.progress-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,#38bdf8);transition:width 1.1s}.lang-progress-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#f59e0b,#fde047);transition:width 1.1s}.contact-section input,.contact-section textarea{width:100%;padding:11px;margin:6px 0 10px;border-radius:12px;border:1px solid var(--line);background:#f8fbff;font-size:1em}.dark .contact-section input,.dark .contact-section textarea{background:#111827;color:#fff;border-color:#3d5888}.contact-section button{background:var(--blue);color:#fff;padding:10px 28px;border:0;border-radius:12px;font-weight:900;font-size:1.02em;margin-top:6px}footer{margin:30px 0 8px;text-align:center;color:#64748b;font-size:1em;font-weight:800}.dark footer{color:#ffe87c}
@media(max-width:900px){body.loaded{display:block}.sidebar{position:relative;width:100%;min-height:auto;height:auto;border-right:0;border-bottom:1px solid var(--line);display:block;padding:14px}.sidebar .sidebar-block{margin:0 0 10px}.sidebar-block.links{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.sidebar-block.links a{margin:0}.quick-nav{display:none}.main-content{margin-left:0;padding:14px}.switch-wrap{position:static;margin:12px 14px}.live-bar{grid-template-columns:1fr}.cover-banner{height:150px;border-radius:22px 22px 0 0}.profile-pic{width:112px;height:112px}.skills-cards{grid-template-columns:repeat(2,1fr)}.section{padding:20px}.sub-headline{font-size:1em}}
@media(max-width:560px){.sidebar-block.links{grid-template-columns:1fr}.btns-center a{width:100%;justify-content:center;margin:5px 0}.skills-cards{grid-template-columns:1fr}.section{border-radius:18px;padding:18px}.profile-pic{width:104px;height:104px;border-width:6px}.live-bar a{font-size:.98em}.switch-btn{font-size:.98em;padding:9px 12px}}
</style>
</head>
<body>
<div class="loading" id="loading">Loading preview...</div>
<div id="app" hidden></div>
<script>
async function loadOriginal(){
  const res=await fetch('index_ar.html?cache=' + Date.now());
  const html=await res.text();
  const doc=new DOMParser().parseFromString(html,'text/html');
  document.getElementById('app').innerHTML=doc.body.innerHTML;
  document.getElementById('app').hidden=false;
  document.getElementById('loading').remove();
  document.body.classList.add('loaded');
  if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');
  updateClock();setInterval(updateClock,1000);fetchWeather();
  document.querySelectorAll('.progress-bar-fill,.lang-progress-bar-fill').forEach(function(bar){var s=bar.getAttribute('style');if(s&&s.includes('width'))bar.style.width=s.split(':')[1];});
}
function toggleDarkMode(){document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light')}
function switchLanguage(){window.location.href='index.html'}
function updateClock(){var el=document.getElementById('clock');if(el)el.innerHTML=new Date().toLocaleTimeString('ar-SA')}
async function fetchWeather(){try{var el=document.getElementById('weather-desc');if(!el)return;const apiKey='e9104c35d90177af561d43f2cf372d4c';const url='https://api.openweathermap.org/data/2.5/weather?q=Jeddah,SA&appid='+apiKey+'&units=metric';const res=await fetch(url);const data=await res.json();if(data.main&&data.weather){el.innerHTML='Jeddah, '+Math.round(data.main.temp)+'&deg;C<br>('+data.weather[0].description+')'}else{el.innerText='Weather not found'}}catch(e){var el=document.getElementById('weather-desc');if(el)el.innerText='Weather error'}}
loadOriginal();
</script>
</body>
</html>
