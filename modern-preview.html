<!doctype html>
<html lang="ar" dir="rtl">
<head>

<style>
:root{--card:#fff;--text:#172033;--muted:#506076;--line:#dbe5f1;--blue:#1261d8;--green:#10a779;--dark:#121826;--shadow:0 18px 48px rgba(15,23,42,.12);--r:24px}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#ddecff 0,#f4f7fb 36%,#eef5ff 100%);background-size:180% 180%;animation:pageGlow 14s ease-in-out infinite;color:var(--text);font-family:'Inter','Cairo','Segoe UI',Tahoma,Arial,sans-serif;line-height:1.75}body.ar{font-family:'Cairo','Inter','Segoe UI',Tahoma,Arial,sans-serif}body.dark{--card:#1f2937;--text:#eef6ff;--muted:#cbd5e1;--line:#334155;--dark:#ffd15b;background:radial-gradient(circle at top left,#1e3a5f 0,#111827 42%,#0f172a 100%)}a{color:inherit}.loading{min-height:100vh;display:grid;place-items:center;font-weight:900;color:var(--blue)}body.loaded{display:flex}
.sidebar{width:292px;background:rgba(255,255,255,.92);border-right:1px solid var(--line);min-height:100vh;padding:18px;position:fixed;left:0;right:auto;top:0;bottom:0;z-index:20;overflow:auto;backdrop-filter:blur(14px);box-shadow:10px 0 34px rgba(15,23,42,.08);animation:slideSide .55s ease both}body.dark .sidebar{background:rgba(31,41,55,.94)}
.sidebar .sidebar-block{margin:0 0 13px;border-radius:18px;padding:14px 15px;background:var(--card);border:1px solid var(--line);box-shadow:0 8px 22px rgba(15,23,42,.05);transition:transform .18s,box-shadow .18s}.sidebar .sidebar-block:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(18,97,216,.12)}.sidebar .sidebar-block.clock{font-size:1.45rem;font-weight:950;text-align:center;color:var(--blue);background:linear-gradient(135deg,#eaf3ff,#fff)}.sidebar .sidebar-block.prayer{background:linear-gradient(135deg,#eef6ff,#fff);color:#173665!important}.sidebar .sidebar-block.prayer *{color:#173665!important;opacity:1!important}.sidebar .sidebar-block.prayer b{color:var(--blue)!important}.sidebar .sidebar-block.weather{background:linear-gradient(135deg,#fff5d6,#fff);color:#946200!important}.sidebar .sidebar-block.weather *{color:#946200!important;opacity:1!important}
.sidebar .sidebar-block.links{background:transparent;border:0;box-shadow:none;padding:0}.sidebar-block.links a{display:flex;align-items:center;gap:9px;background:var(--card);margin-bottom:8px;border-radius:14px;padding:10px 12px;text-decoration:none;color:#1d3658;font-weight:800;font-size:.98rem;border:1px solid var(--line);transition:transform .15s,box-shadow .15s,background .15s}.sidebar-block.links a:hover{background:#edf6ff;color:var(--blue);transform:translateX(3px);box-shadow:0 10px 20px rgba(18,97,216,.14)}body.dark .sidebar-block.links a{background:#111827;color:#e5edf8}.quick-nav{background:rgba(255,255,255,.65);padding:14px;border-radius:18px;border:1px solid var(--line);box-shadow:0 8px 20px rgba(15,23,42,.04)}body.dark .quick-nav{background:#111827}.quick-nav-title{font-weight:950;margin-bottom:8px;color:var(--blue)}.quick-nav a{display:block;color:var(--blue);margin:3px 0;text-decoration:none;padding:8px 10px;border-radius:10px;font-weight:800}.quick-nav a:hover{background:#e8f2ff}
.main-content{flex:1 1 0;margin-left:292px;margin-right:0;padding:26px clamp(14px,2vw,34px) 42px;min-width:0;animation:fadeUp .6s ease both}.switch-wrap{position:fixed;top:18px;right:18px;left:auto;display:flex;gap:10px;z-index:99}.switch-btn{border:0;border-radius:14px;background:var(--dark);color:#fff;padding:10px 16px;font-weight:950;cursor:pointer;box-shadow:0 10px 24px rgba(15,23,42,.16);transition:transform .15s,box-shadow .15s}.switch-btn:hover{background:var(--blue);color:#ffd15b;transform:translateY(-2px);box-shadow:0 16px 30px rgba(18,97,216,.18)}body.dark .switch-btn{background:#ffd15b;color:#173665}
.live-bar{max-width:1060px;margin:0 auto 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:transparent!important;padding:0!important;box-shadow:none!important}.live-bar a{display:flex!important;align-items:center;justify-content:center;gap:8px;padding:12px 16px!important;border-radius:16px!important;color:#fff!important;text-decoration:none!important;font-weight:950!important;box-shadow:0 12px 28px rgba(15,23,42,.12)!important;transition:transform .15s,filter .15s}.live-bar .makkah{background:#0ca878!important}.live-bar .quran{background:#1261d8!important}.live-bar .aljazeera{background:#0f9f5f!important}.live-bar a:hover{transform:translateY(-3px) scale(1.01);filter:brightness(1.08)}
.cover-banner{width:100%;max-width:1060px;height:230px;margin:0 auto;border-radius:30px 30px 0 0;background:url('adi-goldstein-EUsVwEOsblE-unsplash.jpg') center/cover no-repeat;position:relative;margin-bottom:-76px;box-shadow:var(--shadow);border-bottom:4px solid var(--blue);z-index:2;overflow:hidden}.cover-banner:after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0%,rgba(255,255,255,.22) 45%,transparent 58%);transform:translateX(-120%);animation:shine 4.5s ease-in-out infinite}.profile-pic{width:148px!important;height:148px!important;border-radius:50%;border:8px solid var(--card)!important;object-fit:cover;margin:0 auto;position:relative;z-index:3;display:block;top:-2px!important;box-shadow:0 18px 38px rgba(15,23,42,.24);background:#fff;animation:floatPic 5s ease-in-out infinite}.headline{text-align:center;font-size:clamp(2rem,4.2vw,3.4rem)!important;line-height:1.1;font-weight:950;color:var(--blue);margin:12px auto 10px;max-width:1060px;letter-spacing:-.4px}.headline .circle-anim{display:none}.sub-headline{text-align:center;font-size:1.13rem;color:var(--muted)!important;margin:0 auto 22px;max-width:930px}.btns-center{text-align:center;margin-bottom:28px}.btns-center a{display:inline-flex!important;align-items:center;gap:8px;padding:12px 18px!important;margin:6px!important;border-radius:15px!important;color:#fff!important;text-decoration:none!important;font-weight:900!important;box-shadow:0 10px 22px rgba(15,23,42,.14)!important;transition:filter .13s,transform .12s}.linkedin{background:#0077b5!important}.whatsapp{background:#25D366!important}.download-en{background:#2a9c4e!important}.download-ar{background:#b54c0a!important}.btns-center a:hover{filter:brightness(1.08);transform:translateY(-3px) scale(1.01)}
.section{background:var(--card)!important;border:1px solid var(--line);border-radius:var(--r)!important;padding:26px 28px!important;box-shadow:var(--shadow)!important;margin:24px auto!important;max-width:1060px;animation:fadeUp .7s ease both;transition:transform .18s,box-shadow .18s}.section:hover{transform:translateY(-2px);box-shadow:0 24px 55px rgba(15,23,42,.14)!important}.section h2,h2{color:var(--blue)!important;font-size:1.55rem!important;margin-top:0!important;margin-bottom:14px!important;letter-spacing:-.2px}.section p,.section li{font-size:1.02rem;color:var(--text)}.section ul{padding-left:22px}.ar .section ul{padding-left:0;padding-right:22px}.section li{margin-bottom:8px}.exp-date,.edu-date{display:inline-block;color:var(--blue)!important;background:#eaf1ff!important;font-weight:950;border-radius:999px!important;padding:3px 12px!important;font-size:.92rem!important;margin-left:10px}.ar .exp-date,.ar .edu-date{margin-left:0;margin-right:10px}.edu-date{background:#fff3c7!important;color:#9a6500!important}.skills-cards{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:12px!important;margin-bottom:18px!important}.skill-card{background:linear-gradient(135deg,#f8fbff,#e7f4ff)!important;border-radius:16px!important;padding:16px 12px!important;text-align:center!important;box-shadow:0 8px 18px rgba(15,23,42,.07)!important;font-weight:950!important;color:#14506b!important;border:1px solid #dbeafe!important;min-height:96px!important;display:flex!important;align-items:center!important;justify-content:center!important;flex-direction:column!important;gap:8px!important;transition:transform .15s,box-shadow .15s!important}.skill-card:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 14px 28px rgba(18,97,216,.16)!important}.skill-card i{font-size:1.4rem!important}.progress-title,.lang-progress-title{font-weight:950;margin-bottom:5px}.progress-bar-bg,.lang-progress-bar-bg{background:#e5edf7!important;border-radius:999px!important;overflow:hidden;height:17px!important;margin-bottom:13px!important;box-shadow:inset 0 1px 4px rgba(15,23,42,.08)!important}.progress-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,#38bdf8)!important}.lang-progress-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#f59e0b,#fde047)!important}.contact-section input,.contact-section textarea{width:100%!important;padding:12px!important;margin:7px 0 11px!important;border-radius:13px!important;border:1px solid var(--line)!important;background:#f8fbff!important;font-size:1rem!important}.contact-section button{background:var(--blue)!important;color:#fff!important;padding:10px 30px!important;border:0!important;border-radius:13px!important;font-weight:950!important}footer{margin:30px 0 8px;text-align:center;color:#64748b;font-weight:850}
#experience>ul{list-style:none!important;margin:18px 0 0!important;padding-left:28px!important;position:relative}#experience>ul:before{content:"";position:absolute;left:7px;top:8px;bottom:8px;width:3px;border-radius:999px;background:linear-gradient(var(--blue),var(--green))}#experience>ul>li{position:relative;background:linear-gradient(135deg,#fff,#f8fbff);border:1px solid var(--line);border-radius:18px;padding:18px 18px 16px;margin:0 0 16px!important;box-shadow:0 10px 24px rgba(15,23,42,.07)}#experience>ul>li:before{content:"";position:absolute;left:-34px;top:22px;width:15px;height:15px;border-radius:50%;background:var(--blue);border:4px solid #eaf3ff;box-shadow:0 0 0 4px rgba(18,97,216,.10);animation:pulseDot 2.8s ease-in-out infinite}#experience>ul>li>b{font-size:1.08rem;color:var(--blue)}#experience>ul>li>ul{margin-top:10px}.ar #experience>ul{padding-left:0!important;padding-right:28px!important}.ar #experience>ul:before{left:auto;right:7px}.ar #experience>ul>li:before{left:auto;right:-34px}body.dark #experience>ul>li{background:linear-gradient(135deg,#1f2937,#111827)}
@keyframes pageGlow{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes slideSide{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:translateX(0)}}@keyframes floatPic{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes shine{0%{transform:translateX(-120%)}45%,100%{transform:translateX(120%)}}@keyframes pulseDot{0%,100%{box-shadow:0 0 0 4px rgba(18,97,216,.10)}50%{box-shadow:0 0 0 9px rgba(18,97,216,.18)}}
@media(max-width:900px){body.loaded{display:block}.sidebar{position:relative;width:100%;min-height:auto;height:auto;border-right:0;border-bottom:1px solid var(--line);display:block;padding:10px 12px;animation:none}.sidebar .sidebar-block{margin:0 0 9px}.sidebar-block.links{display:flex!important;gap:8px;overflow-x:auto;overflow-y:hidden;white-space:nowrap;padding:0 0 4px!important;margin:0 0 10px!important;scrollbar-width:none}.sidebar-block.links::-webkit-scrollbar{display:none}.sidebar-block.links a{flex:0 0 auto;margin:0!important;padding:8px 12px!important;border-radius:999px!important;font-size:.82rem!important;min-height:38px;box-shadow:none!important}.sidebar-block.links a i{font-size:.95rem!important}.quick-nav{display:none}.main-content{margin-left:0;padding:14px}.switch-wrap{position:static;margin:12px 14px}.live-bar{grid-template-columns:1fr}.cover-banner{height:160px;border-radius:24px 24px 0 0}.profile-pic{width:116px!important;height:116px!important}.skills-cards{grid-template-columns:repeat(2,1fr)!important}.section{padding:20px!important}.sub-headline{font-size:1rem}.headline .circle-anim{display:none}}
@media(max-width:560px){.sidebar{padding:8px 10px}.sidebar .sidebar-block.clock{font-size:1.25rem;padding:10px 12px}.sidebar .sidebar-block.prayer,.sidebar .sidebar-block.weather{padding:11px 12px;border-radius:16px}.sidebar-block.links a{font-size:.78rem!important;padding:7px 11px!important;min-height:34px}.btns-center a{width:100%;justify-content:center;margin:5px 0!important}.skills-cards{grid-template-columns:1fr!important}.section{border-radius:18px!important;padding:18px!important}.profile-pic{width:106px!important;height:106px!important;border-width:6px!important}.live-bar a{font-size:.98rem}.switch-btn{font-size:.98rem;padding:9px 12px}#experience>ul{padding-left:20px!important}.ar #experience>ul{padding-right:20px!important}#experience>ul>li:before{left:-28px}.ar #experience>ul>li:before{right:-28px}}
</style>
</head>
<body>
<div class="loading" id="loading">Loading preview...</div>
<div id="app" hidden></div>
<script>
const params=new URLSearchParams(location.search);const lang=params.get('lang')==='en'?'en':'ar';
async function loadOriginal(){
  const src=lang==='en'?'index.html':'index_ar.html';
  const res=await fetch(src+'?cache='+Date.now());
  const html=await res.text();
  const doc=new DOMParser().parseFromString(html,'text/html');
  document.documentElement.lang=lang==='en'?'en':'ar';document.documentElement.dir=lang==='en'?'ltr':'rtl';document.body.classList.toggle('ar',lang==='ar');
  document.getElementById('app').innerHTML=doc.body.innerHTML;
  document.querySelectorAll('script').forEach(s=>s.remove());
  document.getElementById('app').hidden=false;document.getElementById('loading').remove();document.body.classList.add('loaded');
  if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');
  const langBtn=[...document.querySelectorAll('.switch-btn')].find(b=>b.textContent.includes('EN')||b.textContent.includes('عربي'));
  if(langBtn){langBtn.onclick=()=>{location.href='modern-preview.html?lang='+(lang==='en'?'ar':'en')};langBtn.innerHTML=lang==='en'?'عربي':'EN'}
  updateClock();setInterval(updateClock,1000);fetchWeather();
  document.querySelectorAll('.progress-bar-fill,.lang-progress-bar-fill').forEach(function(bar){var s=bar.getAttribute('style');if(s&&s.includes('width'))bar.style.width=s.split(':')[1];});
}
function toggleDarkMode(){document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light')}
function switchLanguage(){location.href='modern-preview.html?lang='+(lang==='en'?'ar':'en')}
function updateClock(){var el=document.getElementById('clock');if(el)el.innerHTML=new Date().toLocaleTimeString(lang==='en'?'en-GB':'ar-SA')}
async function fetchWeather(){try{var el=document.getElementById('weather-desc');if(!el)return;const apiKey='e9104c35d90177af561d43f2cf372d4c';const url='https://api.openweathermap.org/data/2.5/weather?q=Jeddah,SA&appid='+apiKey+'&units=metric';const res=await fetch(url);const data=await res.json();if(data.main&&data.weather){el.innerHTML=(lang==='en'?'Jeddah':'جدة')+', '+Math.round(data.main.temp)+'&deg;C<br>('+data.weather[0].description+')'}else{el.innerText='Weather not found'}}catch(e){var el=document.getElementById('weather-desc');if(el)el.innerText='Weather error'}}
loadOriginal();
</script>
</body>
</html>
